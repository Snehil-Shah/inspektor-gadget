name: deadlock
description: use uprobe to trace pthread_mutex_lock and pthread_mutex_unlock in libc.so
  and detect potential deadlocks
homepageURL: https://inspektor-gadget.io/
documentationURL: https://www.inspektor-gadget.io/docs/latest/gadgets/deadlock
sourceURL: https://github.com/inspektor-gadget/inspektor-gadget/tree/main/gadgets/deadlock
datasources:
  deadlock:
    annotations:
      cli.clear-screen-before: "true"
    fields:
      comm:
        annotations:
          description: Process name
          template: comm
      mntns_id:
        annotations:
          description: Mount namespace inode id
          template: ns
      mutex1:
        annotations:
          columns.hex: "true"
          columns.width: "20"
          description: address of the first mutex node
      mutex2:
        annotations:
          columns.hex: "true"
          columns.width: "20"
          description: address of second mutex node
      pid:
        annotations:
          description: Process ID
          template: pid
      tid:
        annotations:
          description: Thread ID
          template: pid
      mutex1_stack_id:
        annotations:
          description: stack id when mutex1 was acquired
      mutex2_stack_id:
        annotations:
          description: stack id when mutex2 was acquired
      timestamp:
        annotations:
          template: timestamp
      timestamp_raw:
        annotations:
          columns.hidden: "true"
